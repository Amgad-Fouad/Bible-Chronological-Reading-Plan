<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="خطة القراءة">
<meta name="theme-color" content="#0D1A40">
<title>خطة القراءة اليومية</title>
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom)}
body{font-family:'Cairo',sans-serif;background:#F2F2F7;color:#1C1C1E;
     padding-top:var(--safe-top);padding-bottom:var(--safe-bot);min-height:100dvh}
.view{display:none;min-height:100dvh;flex-direction:column}
.view.active{display:flex}
/* ── Home header ── */
.home-hdr{background:#0D1A40;color:#fff;padding:16px 20px 20px;
           padding-top:calc(var(--safe-top) + 16px)}
.home-hdr h1{font-size:20px;font-weight:700;color:#D4AA30}
.home-hdr .subtitle{font-size:13px;color:rgba(255,255,255,.6);margin-top:3px}
.home-hdr .en-title{font-size:13px;color:rgba(212,170,48,.65);margin-top:2px;font-weight:300;letter-spacing:.4px;direction:ltr;text-align:right;white-space:nowrap;display:inline-block}
.overall-bar{margin-top:14px;background:rgba(255,255,255,.15);border-radius:99px;height:6px}
.overall-fill{height:6px;border-radius:99px;background:#D4AA30;transition:width .4s}
.overall-txt{display:flex;justify-content:space-between;margin-top:6px;
              font-size:12px;color:rgba(255,255,255,.7)}
/* ── Month grid ── */
.months-grid{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1}
.month-card{background:#fff;border-radius:16px;overflow:hidden;
             box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:pointer;
             transition:transform .15s,box-shadow .15s}
.month-card:active{transform:scale(.97)}
.mc-top{padding:14px 14px 10px;color:#fff}
.mc-name{font-size:15px;font-weight:700;line-height:1.3}
.mc-range{font-size:11px;opacity:.75;margin-top:2px}
.mc-body{padding:10px 14px 14px}
.mc-prog-bar{background:#E8E8ED;border-radius:99px;height:4px;margin-bottom:6px}
.mc-prog-fill{height:4px;border-radius:99px;transition:width .4s}
.mc-count{font-size:12px;color:#8E8E93}
.mc-done{font-weight:700}
/* ── Month view header ── */
.month-hdr{color:#fff;padding:16px 20px 18px;
            padding-top:calc(var(--safe-top) + 16px);
            display:flex;align-items:center;gap:12px;flex-shrink:0}
.back-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.2);
           display:flex;align-items:center;justify-content:center;
           font-size:18px;cursor:pointer;flex-shrink:0;border:none;color:#fff}
.back-btn:active{background:rgba(255,255,255,.35)}
.mh-info{flex:1}
.mh-name{font-size:18px;font-weight:700}
.mh-prog{font-size:12px;opacity:.75;margin-top:2px}
.mh-check{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.5);
           display:flex;align-items:center;justify-content:center;
           cursor:pointer;flex-shrink:0;transition:all .25s;background:transparent}
.mh-check:active{opacity:.65}
.mh-check svg{width:15px;height:15px;display:none}
/* ── Days list ── */
.days-list{flex:1;overflow-y:auto;padding:12px 16px;
            padding-bottom:calc(var(--safe-bot) + 12px)}
.day-row{display:flex;align-items:center;background:#fff;
          border-radius:12px;margin-bottom:8px;padding:12px 16px;
          box-shadow:0 1px 4px rgba(0,0,0,.06);gap:12px;cursor:pointer}
.day-row:active{opacity:.75}
.day-row.done{background:#F9F9F9}
.day-num{font-size:13px;font-weight:700;min-width:28px;text-align:right;flex-shrink:0;line-height:1}
.day-info{flex:1;display:flex;flex-direction:column;gap:2px}
.day-date{font-size:12px;font-weight:600;opacity:.7}
.day-rd{font-size:15px;line-height:1.4}
.day-row.done .day-rd{color:#8E8E93;text-decoration:line-through;text-decoration-color:rgba(0,0,0,.2)}
.day-row.done .day-date{color:#8E8E93}
.day-cb{width:24px;height:24px;border-radius:50%;border:2px solid #C7C7CC;
         flex-shrink:0;display:flex;align-items:center;justify-content:center;
         transition:all .2s;background:#fff}
.day-row.done .day-cb{border-color:transparent;color:#fff}
.day-cb svg{width:14px;height:14px;display:none}
.day-row.done .day-cb svg{display:block}
</style>
</head>
<body>

<!-- HOME VIEW -->
<div id="home-view" class="view active">
  <div class="home-hdr">
    <h1>خطة القراءة اليومية</h1>
    <div class="en-title">Daily Reading Plan</div>
    <div class="subtitle">للكتاب المقدس كاملاً · ٣٦٥ يوماً</div>
    <div class="overall-bar"><div class="overall-fill" id="overall-fill" style="width:0%"></div></div>
    <div class="overall-txt">
      <span id="overall-txt-l">التقدم الكلي</span>
      <span id="overall-txt-r">٠ / ٣٦٥</span>
    </div>
  </div>
  <div class="months-grid" id="months-grid"></div>
</div>

<!-- MONTH VIEW -->
<div id="month-view" class="view">
  <div class="month-hdr" id="month-hdr">
    <button class="back-btn" onclick="showHome()">&#8250;</button>
    <div class="mh-info">
      <div class="mh-name" id="mh-name"></div>
      <div class="mh-prog" id="mh-prog"></div>
    </div>
    <div class="mh-check" id="month-cb" onclick="toggleMonthDone()">
      <svg viewBox="0 0 14 14" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="2,7 5.5,11 12,3"/>
      </svg>
    </div>
  </div>
  <div class="days-list" id="days-list"></div>
</div>

const NAMES  = ["يناير", "فبراير", "مارس", "إبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
const COLORS = ["#B85428", "#1B5CAA", "#2A6B2A", "#6048A0", "#1A7878", "#883030", "#182E68", "#887818", "#382868", "#285A38", "#A82858", "#38286A"];

let checked = new Set(JSON.parse(localStorage.getItem('checked_daily') || '[]'));
function save() { localStorage.setItem('checked_daily', JSON.stringify([...checked])); }

function arn(n) {
  return String(n).replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

function updateOverall() {
  const total = 365, done = checked.size;
  const pct = (done/total*100).toFixed(1);
  document.getElementById('overall-fill').style.width = pct + '%';
  document.getElementById('overall-txt-r').textContent = arn(done) + ' / ٣٦٥';
}

function lighten(hex, f) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r+(255-r)*f)},${Math.round(g+(255-g)*f)},${Math.round(b+(255-b)*f)})`;
}

function renderHome() {
  updateOverall();
  const grid = document.getElementById('months-grid');
  grid.innerHTML = '';
  DATA.forEach((mdays, mi) => {
    const color = COLORS[mi];
    const done  = mdays.filter(([dn]) => checked.has(dn)).length;
    const total = mdays.length;
    const pct   = total ? (done/total*100).toFixed(0) : 0;
    const firstDay = mdays[0][1], lastDay = mdays[mdays.length-1][1];
    const card = document.createElement('div');
    card.className = 'month-card';
    card.innerHTML = `
      <div class="mc-top" style="background:${color}">
        <div class="mc-name">${NAMES[mi]}</div>
        <div class="mc-range">${arn(firstDay)} – ${arn(lastDay)} ${NAMES[mi]}</div>
      </div>
      <div class="mc-body">
        <div class="mc-prog-bar">
          <div class="mc-prog-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="mc-count">
          <span class="mc-done" style="color:${color}">${arn(done)}</span> / ${arn(total)} يوم
        </div>
      </div>`;
    card.onclick = () => showMonth(mi);
    grid.appendChild(card);
  });
}

let currentMonth = 0;
function showMonth(mi) {
  currentMonth = mi;
  const color = COLORS[mi];
  document.getElementById('month-hdr').style.background = color;
  document.getElementById('mh-name').textContent = NAMES[mi];
  renderDays(mi);
  updateMonthCheckbox();
  document.getElementById('home-view').classList.remove('active');
  document.getElementById('month-view').classList.add('active');
  document.getElementById('days-list').scrollTop = 0;
}

function renderDays(mi) {
  const mdays = DATA[mi];
  const color  = COLORS[mi];
  const done   = mdays.filter(([dn]) => checked.has(dn)).length;
  document.getElementById('mh-prog').textContent =
    arn(done) + ' / ' + arn(mdays.length) + ' — ' + arn(Math.round(done/mdays.length*100)) + '%';
  const list = document.getElementById('days-list');
  list.innerHTML = '';
  mdays.forEach(([dn, dayOfMonth, monthIdx, rd]) => {
    const isDone = checked.has(dn);
    const dateStr = arn(dayOfMonth) + ' ' + NAMES[monthIdx];
    const row = document.createElement('div');
    row.className = 'day-row' + (isDone ? ' done' : '');
    row.innerHTML = `
      <div class="day-num" style="color:${color}">${arn(dn)}</div>
      <div class="day-info">
        <div class="day-date">${dateStr}</div>
        <div class="day-rd">${rd}</div>
      </div>
      <div class="day-cb" style="${isDone ? `background:${color}` : ''}">
        <svg viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="2,7 5.5,11 12,3"/>
        </svg>
      </div>`;
    row.onclick = () => toggleDay(dn, mi);
    list.appendChild(row);
  });
}

function toggleDay(dn, mi) {
  if (checked.has(dn)) checked.delete(dn); else checked.add(dn);
  save();
  renderDays(mi);
  updateOverall();
  updateMonthCheckbox();
  renderHome();
}

function toggleMonthDone() {
  const mdays = DATA[currentMonth];
  const allDone = mdays.every(([dn]) => checked.has(dn));
  if (allDone) { mdays.forEach(([dn]) => checked.delete(dn)); }
  else { mdays.forEach(([dn]) => checked.add(dn)); }
  save();
  renderDays(currentMonth);
  updateOverall();
  updateMonthCheckbox();
  renderHome();
}

function updateMonthCheckbox() {
  const cb = document.getElementById('month-cb');
  if (!cb) return;
  const mdays = DATA[currentMonth];
  const allDone = mdays.every(([dn]) => checked.has(dn));
  const color = COLORS[currentMonth];
  const svg = cb.querySelector('svg');
  if (allDone) {
    cb.style.background = 'rgba(255,255,255,.9)';
    cb.style.borderColor = 'transparent';
    svg.style.display = 'block';
    svg.setAttribute('stroke', color);
  } else {
    cb.style.background = 'transparent';
    cb.style.borderColor = 'rgba(255,255,255,.5)';
    svg.style.display = 'none';
  }
}

function showHome() {
  document.getElementById('month-view').classList.remove('active');
  document.getElementById('home-view').classList.add('active');
  renderHome();
}

renderHome();

function fitEnTitle() {
  const h1 = document.querySelector('.home-hdr h1');
  const en = document.querySelector('.home-hdr .en-title');
  if (!h1 || !en) return;
  h1.style.display = 'inline-block';
  const target = h1.offsetWidth;
  h1.style.display = '';
  let size = 10;
  en.style.fontSize = size + 'px';
  while (en.scrollWidth < target && size < 60) { size += 0.5; en.style.fontSize = size + 'px'; }
  while (en.scrollWidth > target && size > 6)  { size -= 0.1; en.style.fontSize = size + 'px'; }
}
window.addEventListener('load', fitEnTitle);
window.addEventListener('resize', fitEnTitle);
</script>
